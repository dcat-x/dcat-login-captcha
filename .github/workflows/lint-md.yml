name: Lint Markdown

on:
  push:
    branches: [main, master]
    paths:
      - '**.md'
      - '.lintmdrc'
  pull_request:
    paths:
      - '**.md'
      - '.lintmdrc'

jobs:
  lint-markdown:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Markdown
        uses: lint-md/github-action@v0.1.1
        with:
          configFile: .lintmdrc
          failOnWarnings: false
          files: ./ ./.github/
